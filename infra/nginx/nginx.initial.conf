# Temporary HTTP-only config for initial certbot setup
# After certs are obtained, replace with nginx.prod.conf

user www-data;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    server_tokens off;

    server {
        listen 80;
        server_name auraflow.fit www.auraflow.fit app.auraflow.fit api.auraflow.fit;

        location / {
            return 200 'AuraFlow is being set up...';
            add_header Content-Type text/plain;
        }
    }
}
