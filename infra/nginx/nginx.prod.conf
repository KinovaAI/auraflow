# AuraFlow Nginx Production Config
# Replace YOUR_HETZNER_IP with your actual server IP
# SSL managed by Certbot — run: certbot --nginx -d auraflow.fit -d api.auraflow.fit -d app.auraflow.fit

user www-data;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

worker_rlimit_nofile 8192;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"bytes_sent":$bytes_sent,'
            '"request_time":$request_time,'
            '"http_referrer":"$http_referer",'
            '"http_user_agent":"$http_user_agent",'
            '"request_id":"$request_id"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Body size limit (file uploads)
    client_max_body_size 50m;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/rss+xml application/atom+xml image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com https://sandbox.web.squarecdn.com https://web.squarecdn.com; frame-src https://js.stripe.com https://hooks.stripe.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.auraflow.fit https://api.stripe.com wss:; font-src 'self' data:; base-uri 'self'; form-action 'self' https://checkout.stripe.com;" always;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=100r/s;

    # Upstreams
    upstream api_upstream {
        server 127.0.0.1:8000;
        keepalive 32;
        keepalive_requests 1000;
        # Stay below uvicorn's --timeout-keep-alive (75s in Dockerfile)
        # so nginx closes idle sockets first — prevents "recv() failed (104: Connection
        # reset by peer)" races on socket reuse.
        keepalive_timeout 60s;
    }

    upstream web_upstream {
        server 127.0.0.1:3000;
        keepalive 16;
        keepalive_requests 1000;
        keepalive_timeout 60s;
    }

    # ── HTTP → HTTPS Redirect ──────────────────────────────────────────
    server {
        listen 80;
        server_name auraflow.fit www.auraflow.fit app.auraflow.fit api.auraflow.fit;
        return 301 https://$host$request_uri;
    }

    # CORS origin map — allows whitelisted origins on API responses
    map $http_origin $cors_origin {
        default "";
        "https://app.auraflow.fit" $http_origin;
        "https://auraflow.fit"     $http_origin;
    }

    # ── API ────────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name api.auraflow.fit;

        ssl_certificate /etc/letsencrypt/live/auraflow.fit/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/auraflow.fit/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_tickets off;
        # ssl_stapling on;
        # ssl_stapling_verify on;

        # Custom error page with CORS headers — so backend outages show
        # a proper JSON error instead of a confusing CORS error in the browser
        error_page 502 503 504 @backend_down;
        location @backend_down {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Content-Type' 'application/json' always;
            return 502 '{"detail":"API temporarily unavailable. Please try again shortly."}';
        }

        # CORS preflight handler — returns 204 with headers, never hits backend
        location @cors_preflight {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Request-ID' always;
            add_header 'Access-Control-Max-Age' 86400 always;
            add_header 'Content-Length' 0 always;
            add_header 'Content-Type' 'text/plain' always;
            return 204;
        }

        # Webhook endpoints — higher rate limit, no CORS needed (server-to-server)
        location /webhooks/ {
            limit_req zone=webhook_limit burst=50 nodelay;
            proxy_pass http://api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # Auth endpoints — strict rate limit
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=10 nodelay;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Request-ID' always;
                add_header 'Access-Control-Max-Age' 86400 always;
                return 204;
            }

            proxy_pass http://api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # SSE endpoints (chatbot streaming) — disable buffering
        location /api/v1/chatbot/message {
            limit_req zone=api_limit burst=20 nodelay;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Request-ID' always;
                add_header 'Access-Control-Max-Age' 86400 always;
                return 204;
            }

            proxy_pass http://api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
        }

        # All other API routes
        location / {
            limit_req zone=api_limit burst=60 nodelay;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Request-ID' always;
                add_header 'Access-Control-Max-Age' 86400 always;
                return 204;
            }

            proxy_pass http://api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
        }
    }

    # ── Studio App (app.auraflow.fit) ───────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name app.auraflow.fit;

        ssl_certificate /etc/letsencrypt/live/auraflow.fit/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/auraflow.fit/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        # Static assets — long cache
        location /_next/static/ {
            proxy_pass http://web_upstream;
            proxy_cache_valid 200 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location / {
            proxy_pass http://web_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # ── Marketing Site (auraflow.fit) ───────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name auraflow.fit www.auraflow.fit;

        ssl_certificate /etc/letsencrypt/live/auraflow.fit/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/auraflow.fit/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        # www → non-www
        if ($host = www.auraflow.fit) {
            return 301 https://auraflow.fit$request_uri;
        }

        location / {
            proxy_pass http://web_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
