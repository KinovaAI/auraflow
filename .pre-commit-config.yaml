# AuraFlow pre-commit hooks.
# Install once: pip install pre-commit && pre-commit install
# Run manually on whole repo: pre-commit run --all-files

repos:
  # ── Core sanity checks ────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: end-of-file-fixer
        exclude: ^apps/(web/package-lock\.json|web/\.next/|api/venv/)
      - id: trailing-whitespace
        exclude: ^apps/(web/package-lock\.json|web/\.next/|api/venv/)
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # ── Python: ruff (lint + format) ──────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: ["--fix"]
        files: ^apps/api/.*\.py$
      - id: ruff-format
        files: ^apps/api/.*\.py$

  # ── Python: bandit (security — warn-only, for awareness) ──────────────────
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.0
    hooks:
      - id: bandit
        args: ["-lll", "-q", "-r"]
        files: ^apps/api/app/.*\.py$
        # Warn-only during bootstrap; promote to block after baseline clean
        stages: [manual]

  # ── JS/TS: prettier ───────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: ^apps/web/src/.*\.(ts|tsx|js|jsx|json|md|css|scss)$
        exclude: ^apps/web/(\.next/|node_modules/|package-lock\.json$)

  # ── JS/TS: eslint (web) ───────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: web-eslint
        name: eslint (apps/web)
        language: system
        entry: bash -c 'cd apps/web && npx eslint --fix'
        files: ^apps/web/src/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false

  # ── Secrets scan ──────────────────────────────────────────────────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: ^(apps/web/package-lock\.json|apps/web/\.next/|apps/api/venv/|.*\.ipynb)$

ci:
  autofix_prs: true
  autoupdate_schedule: weekly
